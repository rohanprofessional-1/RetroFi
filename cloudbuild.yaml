# Triggered on push/merge to main via Cloud Build (see scripts/setup-cloud-build-trigger.sh).
# Frontend build reads VITE_API_BASE_URL from frontend/.env.production (committed).
# Backend secrets are loaded from Secret Manager at deploy time.

steps:
  # ── Backend: build, push, deploy to Cloud Run ──────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --platform=linux/amd64
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/retrofi-atl/backend:$BUILD_ID
      - -t
      - us-east1-docker.pkg.dev/$PROJECT_ID/retrofi-atl/backend:latest
      - -f
      - backend/Dockerfile
      - backend
    id: build-backend

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/$PROJECT_ID/retrofi-atl/backend
    id: push-backend
    waitFor:
      - build-backend

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - retrofi-backend
      - --image=us-east1-docker.pkg.dev/$PROJECT_ID/retrofi-atl/backend:$BUILD_ID
      - --region=us-east1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=RENTCAST_API_KEY=RENTCAST_API_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
      - --set-env-vars=FRONTEND_URL=https://$PROJECT_ID.web.app,ANTHROPIC_MODEL=claude-3-5-haiku-latest
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=60
    id: deploy-backend
    waitFor:
      - push-backend

  # ── Frontend: build from .env.production, deploy to Firebase Hosting ───────
  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        cd frontend
        if [ ! -f .env.production ]; then
          echo "ERROR: frontend/.env.production is missing."
          echo "Add VITE_API_BASE_URL (see .env.production.example) and commit the file."
          exit 1
        fi
        npm ci
        npm run build
    id: build-frontend
    waitFor:
      - deploy-backend

  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        npm install -g firebase-tools
        firebase deploy --only hosting --project "$PROJECT_ID" --token "$$FIREBASE_TOKEN"
    secretEnv:
      - FIREBASE_TOKEN
    id: deploy-frontend
    waitFor:
      - build-frontend

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-token/versions/latest
      env: FIREBASE_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - us-east1-docker.pkg.dev/$PROJECT_ID/retrofi-atl/backend:$BUILD_ID
  - us-east1-docker.pkg.dev/$PROJECT_ID/retrofi-atl/backend:latest
